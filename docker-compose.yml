version: '3.8'

services:
  # --- Backend Service (FastAPI) ---
  api:
    build: ./backend
    container_name: glu2k-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://nexus:securepass@db:5432/nexus_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change_this_in_production_super_secret_key
      - ENCRYPTION_KEY=D7pZhH9y2W3k4L5m6N7o8P9qR0sT1uV2wX3yZ4a5b6c= # Example Fernet Key
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - glu2k-net
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # --- Frontend Service (React/Vite) ---
  ui:
    build: ./frontend
    container_name: glu2k-ui
    ports:
      - "3000:3000" # Vite default
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - api
    networks:
      - glu2k-net
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  # --- Database (PostgreSQL) ---
  db:
    image: postgres:15-alpine
    container_name: glu2k-db
    environment:
      - POSTGRES_USER=nexus
      - POSTGRES_PASSWORD=securepass
      - POSTGRES_DB=nexus_db
    ports:
      - "5432:5432"
    networks:
      - glu2k-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # --- Cache (Redis) ---
  redis:
    image: redis:7-alpine
    container_name: glu2k-redis
    ports:
      - "6379:6379"
    networks:
      - glu2k-net
    volumes:
      - redis_data:/data
    restart: unless-stopped

networks:
  glu2k-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
